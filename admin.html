<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Enquiries — Bespoke Web Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;--bg-soft:#111110;--ivory:#F5F1EA;
  --ivory-dim:rgba(245,241,234,.55);--ivory-faint:rgba(245,241,234,.28);
  --gold:#C9A96E;--gold-soft:rgba(201,169,110,.35);--hairline:rgba(245,241,234,.12);
  --serif:'Playfair Display',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ivory);font-family:var(--sans);font-weight:300;line-height:1.6;min-height:100vh}
::selection{background:var(--gold);color:var(--bg)}
a{color:var(--gold);text-decoration:none}

/* gate */
.gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:5vw}
.gate .mono{font-family:var(--serif);font-size:30px;letter-spacing:.06em}
.gate .mono em{color:var(--gold);font-style:normal}
.gate .label{font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:var(--gold)}
.gate form{display:flex;flex-direction:column;gap:18px;width:min(340px,90vw);align-items:stretch}
.gate input{background:transparent;border:none;border-bottom:1px solid var(--hairline);color:var(--ivory);
  font-family:var(--sans);font-size:16px;padding:12px 0;outline:none;text-align:center;letter-spacing:.1em;transition:border-color .4s}
.gate input:focus{border-color:var(--gold)}
.gate .err{font-size:12px;color:#caa;min-height:16px;text-align:center}
.btn{background:transparent;border:1px solid var(--gold-soft);color:var(--ivory);font-family:var(--sans);
  font-size:10px;letter-spacing:.4em;text-transform:uppercase;padding:16px 36px;border-radius:99px;cursor:pointer;
  position:relative;overflow:hidden;transition:color .5s,border-color .5s}
.btn::before{content:"";position:absolute;inset:0;background:var(--gold);transform:translateY(101%);transition:transform .5s var(--ease);z-index:-1;border-radius:99px}
.btn:hover{color:var(--bg)}.btn:hover::before{transform:none}

/* dashboard */
.dash{display:none;padding:48px 5vw 96px}
.dash.show{display:block}
header.bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;
  padding-bottom:28px;border-bottom:1px solid var(--hairline);margin-bottom:48px}
header.bar .mono{font-family:var(--serif);font-size:22px;letter-spacing:.06em}
header.bar .mono em{color:var(--gold);font-style:normal}
header.bar .sub{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--ivory-dim);margin-top:4px}
header.bar .tools{display:flex;align-items:center;gap:24px}
header.bar .count{font-family:var(--serif);font-style:italic;color:var(--gold);font-size:18px}
.ghost{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ivory-dim);background:none;border:none;cursor:pointer;transition:color .4s}
.ghost:hover{color:var(--gold)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
.card{border:1px solid var(--hairline);border-radius:18px;padding:26px;background:var(--bg-soft);transition:border-color .4s,transform .4s var(--ease)}
.card:hover{border-color:var(--gold-soft);transform:translateY(-3px)}
.card .top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:6px}
.card h3{font-family:var(--serif);font-weight:500;font-size:24px}
.card .when{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ivory-faint);white-space:nowrap}
.card .brand{color:var(--ivory-dim);font-size:13px;margin-bottom:18px}
.card .row{display:flex;gap:10px;font-size:13px;margin:8px 0;align-items:baseline}
.card .k{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);min-width:74px;flex-shrink:0}
.card .v{color:var(--ivory)}
.card .v a{word-break:break-all}
.card .budget{display:inline-block;font-size:10px;letter-spacing:.2em;border:1px solid var(--hairline);
  border-radius:99px;padding:5px 12px;color:var(--ivory-dim);margin-top:4px}
.card .vision{color:var(--ivory-dim);font-size:13px;border-top:1px solid var(--hairline);margin-top:18px;padding-top:16px;white-space:pre-wrap}
.card .del{margin-top:18px;background:none;border:none;color:var(--ivory-faint);font-family:var(--sans);
  font-size:9px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:color .4s;padding:0}
.card .del:hover{color:#c98}
.empty,.loading{text-align:center;color:var(--ivory-dim);padding:80px 0;font-family:var(--serif);font-style:italic;font-size:22px}
</style>
</head>
<body>

<section class="gate" id="gate">
  <div class="mono">R<em>B</em></div>
  <div class="label">Studio Enquiries</div>
  <form id="loginForm">
    <input id="pw" type="password" placeholder="Enter password" autocomplete="current-password" autofocus>
    <button class="btn" type="submit">Enter</button>
    <div class="err" id="err"></div>
  </form>
</section>

<section class="dash" id="dash">
  <header class="bar">
    <div>
      <div class="mono">R<em>B</em> — Enquiries</div>
      <div class="sub">Commission Inbox</div>
    </div>
    <div class="tools">
      <span class="count" id="count"></span>
      <button class="ghost" id="refresh">Refresh</button>
      <button class="ghost" id="logout">Sign out</button>
    </div>
  </header>
  <div id="list"><div class="loading">Loading…</div></div>
</section>

<script>
const KEY='rb_admin_key';
const gate=document.getElementById('gate');
const dash=document.getElementById('dash');
const err=document.getElementById('err');
const list=document.getElementById('list');
const countEl=document.getElementById('count');

function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(d){
  try{return new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
  catch{return d}
}

async function load(key){
  list.innerHTML='<div class="loading">Loading…</div>';
  const r=await fetch('/api/enquiry',{headers:{'Authorization':'Bearer '+key}});
  if(r.status===401){throw new Error('unauthorized')}
  if(!r.ok){throw new Error('server')}
  const {enquiries}=await r.json();
  countEl.textContent=enquiries.length+(enquiries.length===1?' enquiry':' enquiries');
  if(!enquiries.length){list.innerHTML='<div class="empty">No enquiries yet.</div>';return}
  list.innerHTML='<div class="cards">'+enquiries.map(e=>`
    <article class="card">
      <div class="top">
        <h3>${esc(e.name)}</h3>
        <span class="when">${esc(fmtDate(e.created_at))}</span>
      </div>
      ${e.brand?`<div class="brand">${esc(e.brand)}</div>`:''}
      <div class="row"><span class="k">Email</span><span class="v"><a href="mailto:${esc(e.email)}">${esc(e.email)}</a></span></div>
      ${e.budget?`<div class="row"><span class="k">Budget</span><span class="v"><span class="budget">${esc(e.budget)}</span></span></div>`:''}
      ${e.vision?`<div class="vision">${esc(e.vision)}</div>`:''}
      <button class="del" data-id="${e.id}">Remove</button>
    </article>`).join('')+'</div>';
  list.querySelectorAll('.del').forEach(b=>b.addEventListener('click',()=>remove(b.dataset.id)));
}

async function remove(id){
  if(!confirm('Remove this enquiry permanently?'))return;
  const key=localStorage.getItem(KEY);
  try{
    const r=await fetch('/api/enquiry?id='+encodeURIComponent(id),{method:'DELETE',headers:{'Authorization':'Bearer '+key}});
    if(!r.ok)throw new Error();
    load(key);
  }catch{alert('Could not remove that enquiry.')}
}

function showDash(){gate.style.display='none';dash.classList.add('show')}
function showGate(){dash.classList.remove('show');gate.style.display='flex';document.getElementById('pw').focus()}

async function attempt(key){
  try{await load(key);localStorage.setItem(KEY,key);showDash();}
  catch(e){
    localStorage.removeItem(KEY);
    if(e.message==='unauthorized'){err.textContent='Incorrect password.';showGate();}
    else{err.textContent='Could not reach the server.';showGate();}
  }
}

document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();err.textContent='';
  const key=document.getElementById('pw').value;
  if(key)attempt(key);
});
document.getElementById('refresh').addEventListener('click',()=>{
  const key=localStorage.getItem(KEY);if(key)load(key).catch(()=>showGate());
});
document.getElementById('logout').addEventListener('click',()=>{
  localStorage.removeItem(KEY);document.getElementById('pw').value='';showGate();
});

// auto-login if we have a stored key
const saved=localStorage.getItem(KEY);
if(saved)attempt(saved);
</script>
</body>
</html>
